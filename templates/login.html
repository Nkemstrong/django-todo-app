{% extends "base.html" %}

{% block title %}
Login | TodoFlow
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">

            <h2>Welcome Back 👋</h2>

            <p>
                Sign in to continue managing your daily tasks.
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter your username"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>

            </div>

            <button
                class="btn btn-dark w-100 auth-btn"
                type="submit">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{% url 'register' %}">

                Create Account

            </a>

        </div>

    </div>

</div>

{% endblock %}
