{% extends "base.html" %}

{% block title %}
Register | TodoFlow
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">

            <h2>Create Account</h2>

            <p>

                Join TodoFlow and start organizing your tasks.

            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-dark w-100 auth-btn mt-3">

                Create Account

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="{% url 'login' %}">

                Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
